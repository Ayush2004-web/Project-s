<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency Converter</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-primary">
    <div class="container-fluid main-container">
      <div class="header text-center bg-warning">
        <h1>Currency Converter</h1>
      </div>

      <div class="container mt-5 bg-white">
        <div class="converter-card">
          <div class="row g-4 align-items-center">

            <div class="col-md-5">
              <div class="flag-box text-center">
                <img
                  id="flag1"
                  src="https://flagsapi.com/US/flat/64.png"
                  alt="flag"
                />
              </div>

              <label class="form-label mt-3">From Country</label>

              <select id="country1" class="form-select"></select>

              <div id="errorFrom" class="error-text"></div>
            </div>

            <div class="col-md-2 text-center ">
              <button id="swapBtn" class="btn swap-btn text-black">
                <i class="bi bi-arrow-left-right"></i>
              </button>
            </div>


            <div class="col-md-5">
              <div class="flag-box text-center">
                <img
                  id="flag2"
                  src="https://flagsapi.com/IN/flat/64.png"
                  alt="flag"
                />
              </div>
              <label class="form-label mt-3">To Country</label>
              <select id="country2" class="form-select"></select>
              <div id="errorTo" class="error-text"></div>
            </div>
          </div>

          <div class="row mt-4 justify-content-center">
            <div class="col-md-6">
              <label class="form-label">Enter Amount</label>
              <input
                type="number"
                id="orgAmount"
                class="form-control"
                placeholder="Enter amount"
              />

              <div id="errorAmount" class="error-text"></div>
            </div>
          </div>

          <div class="row mt-4 justify-content-center">
            <div class="col-md-6">
              <button id="convertBtn" class="btn btn-primary w-100 convert-btn">
                Convert
              </button>
            </div>
          </div>

          <div class="text-center mt-3">
            <div id="loading" class="loading-text"></div>
          </div>

          <div class="result-box text-center mt-4">
            <h2 id="newAmount">Converted Amount : 0.00</h2>
            <p id="rateText"></p>
          </div>
        </div>
      </div>
    </div>

    <!-- scripts -->
      <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./currency.js"></script>
  </body>
</html>
