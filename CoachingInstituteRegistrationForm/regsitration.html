<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RICR Registration Form</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./registration.css">
  </head>
  <body>
     <header>
        <h1>Coaching Institute Registration Form</h1>
    </header>

    <main>
        <form>

            <!-- Personal Information -->
            <section>
                <h2>Personal Information</h2>

                <div class="form-group">
                    <label for="fullname">Full Name</label>
                    <input type="text" id="fullname" placeholder="Enter full name">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter email address">
                </div>

                <div class="form-group">
                    <label for="mobile">Mobile Number</label>
                    <input type="tel" id="mobile" placeholder="Enter mobile number">
                </div>

                <div class="form-group">
                    <label for="dob">Date of Birth</label>
                    <input type="date" id="dob">
                </div>
            </section>

            <!-- Academic Details -->
            <section>
                <h2>Academic Details</h2>

                <div class="form-group">
                    <label for="qualification">Last Completed Qualification</label>
                    <select id="qualification">
                        <option value="">Select Qualification</option>
                        <option>10th</option>
                        <option>12th</option>
                        <option>Graduate</option>
                        <option>Postgraduate</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="percentage">Percentage / Grade</label>
                    <input type="text" id="percentage" placeholder="Enter percentage or grade">
                </div>
            </section>

            <!-- Course Information -->
            <section>
                <h2>Course Information</h2>

                <div class="form-group">
                    <label for="course">Preferred Course</label>
                    <select id="course">
                        <option value="">Select Course</option>
                        <option>IIT-JEE</option>
                        <option>NEET</option>
                        <option>Banking Exams</option>
                        <option>UPSC</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="batch">Batch Timing Preference</label>
                    <select id="batch">
                        <option value="">Select Batch</option>
                        <option>Morning</option>
                        <option>Afternoon</option>
                        <option>Evening</option>
                        <option>Weekend</option>
                    </select>
                </div>
            </section>

            <!-- Address -->
            <section>
                <h2>Address</h2>

                <div class="form-group">
                    <label for="address">Residential Address</label>
                    <textarea id="address" rows="4" placeholder="Enter full address"></textarea>
                </div>

                <div class="form-group">
                    <label for="city">City</label>
                    <input type="text" id="city" placeholder="Enter city name">
                </div>

                <div class="form-group">
                    <label for="pincode">Pin Code</label>
                    <input type="text" id="pincode" placeholder="Enter pin code">
                </div>
            </section>

            <!-- Guardian Details -->
            <section>
                <h2>Guardian Details</h2>

                <div class="form-group">
                    <label for="guardianname">Guardian's Full Name</label>
                    <input type="text" id="guardianname" placeholder="Enter guardian name">
                </div>

                <div class="form-group">
                    <label for="guardianmobile">Guardian's Contact Number</label>
                    <input type="tel" id="guardianmobile" placeholder="Enter guardian mobile number">
                </div>
            </section>

            <!-- Additional Information -->
            <section>
                <h2>Additional Information</h2>

                <div class="form-group">
                    <label for="reference">How did you hear about us?</label>
                    <select id="reference">
                        <option value="">Select Option</option>
                        <option>Friends</option>
                        <option>Online Ad</option>
                        <option>Newspaper</option>
                        <option>Social Media</option>
                        <option>Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="requirements">Special Requirements</label>
                    <textarea id="requirements" rows="4" placeholder="Optional"></textarea>
                </div>
            </section>

            <div class="button-group">
                <button type="submit">Register</button>
                <button type="reset">Reset</button>
            </div>

        </form>
    </main>

    <footer>
        <p>© 2026 Coaching Institute. All Rights Reserved.</p>
    </footer>


    <!--scripts-->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script src="./registration.js"></script>
  </body>
</html>
